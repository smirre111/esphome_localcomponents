
syntax = "proto3";

// Authoritative copy — kept in sync with:
//   c:\Development\PlatformIO\PlatformIO\BlindsESP\proto\blinds.proto
// Regenerate stubs with:
//   protoc-c --c_out=local_components/blindsproto \
//             --proto_path=local_components/lora_tracker/proto \
//             blinds.proto


enum CovOperation {
    CMD_OPEN = 0;
    CMD_CLOSE = 1;
    CMD_STOP = 2;
}


message LoraCoverOperation {
    oneof covop {
        CovOperation operation = 1;
        float position = 2;
    }
}

enum ClientOperation {
    CMD_ENABLE_WIFI = 0;
    CMD_DISABLE_WIFI = 1;
    CMD_OTA = 2;
    CMD_STATUS = 3;
    CMD_SLEEP = 4;
}


message ClientConfig {
    uint64 mac_addr = 1;
    uint32 addr = 2;
    uint32 subnt = 3;
    bytes name = 4;
    uint64 sleepDuration = 5;
}

message CoverConfig {
    uint32 openTime = 1;
    uint32 closeTime = 2;
    float blindHeightMm = 3;
    float axleDiameterMm = 4;
    float blindThicknessMm = 5;
}

message LoginMsg {
    uint32 nonce = 1;
}

// Exchange used to provision a per-peer base nonce for nonce derivation.
message BaseNonceExchange {
    // Optional key identifier for which key this base-nonce is associated
    bytes key_id = 1;
    // 4-byte base nonce unique per-peer
    bytes base_nonce = 2;
}


// Encryption algorithm identifiers for on-air encrypted payloads.
enum EncryptionAlgo {
    ENC_NONE = 0;
    ENC_AES_GCM_128 = 1;        // AES-GCM 128-bit key (recommended)
}

// Result of processing a command on the node.
enum AckStatus {
    ACK_OK = 0;    // command accepted / executed
    ACK_ERROR = 1; // command rejected or failed
    ACK_BUSY = 2;  // node busy, command not applied
}

// Acknowledgement of a received command, sent node -> hub so the hub can
// confirm delivery and stop retransmitting.  ack_msg_id echoes the
// LoraHeader.msgId of the command being acknowledged.
message CommandAck {
    uint32 ack_msg_id = 1;
    AckStatus status = 2;
}

// When a payload is encrypted, the structured protobuf messages are not
// present; instead the envelope carries this EncryptedPayload which holds
// algorithm metadata, IV, optional key identifier, auth tag and ciphertext.
// Slim on-air AEAD envelope.  Algorithm is fixed (AES-GCM-128 with a truncated
// tag), and the IV/AAD are reconstructed by the receiver from the plaintext
// outer header — so only the tag and ciphertext are transmitted.  The ciphertext
// is the payload-only inner message (its header is NOT re-encrypted; the receiver
// uses the outer header).
message EncryptedPayload {
    bytes tag = 1;        // truncated AES-GCM-128 auth tag
    bytes ciphertext = 2; // AEAD-encrypted payload-only inner protobuf
}


message LoraHeader {
    uint32 destAddress = 1;
    uint32 destSubnet = 2;
    uint32 senderAddress = 3;
    uint32 msgId = 4;
    // field 5 (encrypted) removed — encryption is inferred from the oneof case
    // (presence of the `encrypted` payload), not a header flag.
    // Burst scheduling (hub -> node): each copy of a TX burst carries its own
    // 0-based index and the total count.  The node uses these to compute when
    // the burst ends and defers its response until the channel is clear.
    // burstCount == 0 means "not part of a burst" (single-shot) -> no deferral.
    uint32 burstIndex = 6;
    uint32 burstCount = 7;
}

message LoraClientOperationMessage {
    LoraHeader header = 1;
    oneof cmd {
        LoraCoverOperation operation = 10;
        ClientOperation sysop = 11;
        ClientConfig clientconfig = 12;
        CoverConfig coverconfig = 13;
        LoginMsg login = 14;
        BaseNonceExchange basenonce = 15;
        // When this field is present the message is encrypted (AEAD blob); the
        // structured fields above are absent.  Field 9 keeps a 1-byte tag.
        EncryptedPayload encrypted = 9;
    }
}

message ClientRegister {
    uint64 mac_addr = 1;
    // Set by the node when it needs the hub to (re)push its configuration —
    // i.e. it is not yet provisioned.  A provisioned node waking from deep
    // sleep leaves this false so the hub skips the ClientConfig/CoverConfig
    // bursts and goes straight to the LoginMsg handshake (saves awake radio
    // time / battery).  The hub also force-pushes once per hub boot regardless,
    // so config changes flashed into the hub are always delivered.
    bool needs_config = 2;
}

message ClientAvailable {
    bool available = 1;
}

message ClientBattery {
    float voltage = 1;
}

message CoverPosition {
    float position = 1;
    float voltage = 2;
    float current = 3;
}


message LoraClientResponseMessage {
    LoraHeader header = 1;
    oneof proto {
        ClientAvailable avail = 10;
        ClientRegister register = 11;
        ClientBattery state = 12;
        CoverPosition position = 13;
        LoginMsg login = 14;
        CommandAck ack = 15;
        // When present the message is encrypted (AEAD blob); structured fields
        // above are absent.  Field 9 keeps a 1-byte tag.
        EncryptedPayload encrypted = 9;
    }
}
