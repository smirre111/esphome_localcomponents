

substitutions:
  device_name: smartplugtwo
  # Higher value gives lower watt readout
  current_res: '0.00290'
  # Lower value gives lower voltage readout
  voltage_div: '940'


####

esphome:
  name: ${device_name}
  comment: "Gosund Smart Wifi Socket"
  name_add_mac_suffix: true
  project:
    name: "Gosund.Smart-Wifi-Socket"
    version: "V0"


esp8266:
  board: esp8285
  restore_from_flash: true
  early_pin_init: False

####

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: .fritz.box

#  ssid: !secret wifi_ssid
#  password: !secret wifi_password


####
  
# Enable logging
logger:


####

# Enable Home Assistant API
api:

#  password: !secret esphome_api_password


####

ota:
  platform: esphome
#  password: !secret esphome_ota_password


####

web_server:
  port: 80


####

binary_sensor:
  - platform: gpio
    id: button
    internal: true
    pin:
      number: GPIO13
    on_press:
      - switch.toggle: relay


####

output:
  - platform: gpio
    pin: GPIO00
    inverted: true
    id: led


####

switch:
  - platform: gpio
    pin: GPIO15
    id: relay
    name: '${device_name} Relay'
    on_turn_on:
      - output.turn_on: led
    on_turn_off:
      - output.turn_off: led


####

status_led:
  pin:
    number: GPIO02
    inverted: true

####

sensor:
  - platform: uptime
    name: '${device_name} Uptime'
    unit_of_measurement: days
    update_interval: 300s
    filters:
      - multiply: 0.000011574

  - platform: wifi_signal
    name: '${device_name} WiFi Signal'
    update_interval: 300s

  - platform: hlw8012
    sel_pin:
      number: GPIO12
      inverted: true
    cf_pin: GPIO05
    cf1_pin: GPIO14
    current_resistor: ${current_res}
    voltage_divider: ${voltage_div}
    current:
      name: '${device_name} Current'
      unit_of_measurement: 'A'
      accuracy_decimals: 3
      icon: mdi:flash-outline
    voltage:
      name: '${device_name} Voltage'
      unit_of_measurement: 'V'
      icon: mdi:flash-outline
    power:
      name: '${device_name} Power'
      unit_of_measurement: 'W'
      icon: mdi:flash-outline
    change_mode_every: 4
    update_interval: 10s



