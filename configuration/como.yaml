

substitutions:
  device_name: como



####

esphome:
  name: ${device_name}

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

external_components:
  # use all components from a local folder
  - source:
      type: local
      path: local_components

####

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: .fritz.box

#  ssid: !secret wifi_ssid
#  password: !secret wifi_password


####
  
# Enable logging
logger:


####

# Enable Home Assistant API
api:

#  password: !secret esphome_api_password


####

ota:
  platform: esphome
#  password: !secret esphome_ota_password


####

web_server:
  port: 80

uart:
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 38400
####

climate:
  - platform: rika_stove
    name: Como
    pin_code: "1211"
    #update_interval: 500ms



text_sensor:
  - platform: rika_stove
    stove_status:
      name: "Stove raw status"

sensor:
  - platform: dht
    pin: GPIO5
    temperature:
      name: "Rika Temperature"
    humidity:
      name: "Rika Humidity"
    update_interval: 60s

  - platform: wifi_signal
    name: "${device_name} - Wifi Signal"
    update_interval: 60s
    icon: mdi:wifi

  - platform: uptime
    name: "${device_name} - Uptime"
    update_interval: 60s
    icon: mdi:clock-outline
